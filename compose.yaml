services:
  mcp-standalone:
    build:
      context: .
    image: mcp-standalone:local
    environment:
      PORT: "8080"
      MCP_HISTORY_SIZE: "${MCP_HISTORY_SIZE:-10}"
      MCP_DASHBOARD_ENABLED: "${MCP_DASHBOARD_ENABLED:-false}"
      MCP_COMPAT_PATHS_ENABLED: "${MCP_COMPAT_PATHS_ENABLED:-true}"
    ports:
      - "${HOST_PORT:-8080}:8080"
